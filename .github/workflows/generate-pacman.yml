name: Generate Pac-Man contribution graph

on:
  workflow_dispatch:
  schedule:
    - cron: "12 */6 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/generate-pacman.yml"
      - "scripts/sync-pacman-calendar.mjs"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Generate Pac-Man SVGs
        uses: abozanona/pacman-contribution-graph@v5.0.0
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.PROFILE_STATS_TOKEN }}
          games: pacman

      - name: Sync blocks with authenticated contribution calendar
        env:
          PROFILE_STATS_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
          PROFILE_USERNAME: ${{ github.repository_owner }}
        run: node scripts/sync-pacman-calendar.mjs

      - name: Push SVGs to pacman-output branch
        uses: crazy-max/ghaction-github-pages@v5.0.0
        with:
          target_branch: pacman-output
          build_dir: dist
          commit_message: "Atualiza grafico Pac-Man"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
